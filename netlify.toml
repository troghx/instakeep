[build]
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "no-store"
