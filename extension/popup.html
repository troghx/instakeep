<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media Capture</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17211c;
        background: #f6f7f4;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
        line-height: 1.2;
      }

      button,
      a {
        width: 100%;
        display: block;
        border: 1px solid #186b52;
        border-radius: 8px;
        background: #186b52;
        color: white;
        padding: 10px 12px;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
      }

      button + button {
        margin-top: 8px;
      }

      label {
        display: grid;
        gap: 5px;
        margin: 0 0 10px;
        color: #415149;
        font-size: 12px;
        font-weight: 800;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #cad4cf;
        border-radius: 8px;
        background: white;
        color: #17211c;
        font: inherit;
        font-size: 12px;
        padding: 9px 10px;
      }

      a {
        box-sizing: border-box;
        margin-top: 8px;
        background: transparent;
        color: #186b52;
      }

      p {
        min-height: 36px;
        margin: 10px 0 0;
        color: #68756e;
        font-size: 13px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <h1>Media Local Gallery</h1>
    <label>
      App destino
      <input id="app-url" type="url" spellcheck="false" />
    </label>
    <button id="capture" type="button">Capturar visible</button>
    <button id="deep-capture" type="button">Captura profunda con scroll</button>
    <a id="open-app" href="https://instakeep-troghx.netlify.app" target="_blank" rel="noreferrer">Abrir app</a>
    <p id="status">Captura solo cuando pulsas el boton.</p>
    <script src="popup.js"></script>
  </body>
</html>
